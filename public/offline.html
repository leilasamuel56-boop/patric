<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne - Ekobanque</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #091e16;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 450px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin: 20px;
    }
    .icon-wrapper {
      margin-bottom: 24px;
      display: inline-block;
      padding: 20px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 50%;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    svg {
      width: 48px;
      height: 48px;
      color: #10b981;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 12px 0;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-block;
      background-color: #10b981;
      color: #091e16;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s, transform 0.1s;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #34d399;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .brand {
      margin-top: 30px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <!-- Lucide CloudOff icon representation -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5l14 14"/>
        <path d="M11.35 5.65a8 8 0 0 0-5.61 5.61"/>
        <path d="M12 10h-.01"/>
        <path d="M1.39 12.36A5 5 0 0 0 6 18h11.17"/>
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Il semble que votre connexion Internet soit interrompue. Ekobanque conserve vos données en sécurité. Reconnectez-vous pour actualiser vos comptes.</p>
    <button class="btn" onclick="window.location.reload()">Réessayer</button>
    <div class="brand">Ekobanque</div>
  </div>
</body>
</html>
